name: threed_orimaster
description: "A 3D Origami Application - 3D OriMaster"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  path_provider: ^2.1.2
  dio: ^5.4.0
  archive: ^3.4.10
  flutter_3d_controller: ^1.2.1
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/origami_database.json
    - assets/Beginner Origami/Dividing Paper/Folding Paper into Thirds 3 x 3 Grid.png
    - assets/Beginner Origami/Folding Techniques/Rabbit Ear Fold/rabbit_ear_fold.png
    - assets/Easy Origami/Origami Shield With Cross/Origami Shield With Cross.png
